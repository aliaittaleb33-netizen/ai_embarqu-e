<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Dashboard IoT Météo</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; }
        .carte { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; margin: 10px; width: 250px; }
        .valeur { font-size: 2em; font-weight: bold; color: #007BFF; }
        .ia { color: #28a745; }
    </style>
</head>
<body>

    <h1>Ma Station Météo & Edge AI</h1>
    
    <div class="carte">
        <h3>🌡️ Température</h3>
        <p class="valeur"><span id="val_temp">--</span> °C</p>
    </div>

    <div class="carte">
        <h3>🤖 Prédiction IA (Pluie)</h3>
        <p class="valeur ia"><span id="val_ia">--</span> %</p>
    </div>

    <script>
        // L'URL magique pour lire ton canal ThingSpeak (1 seul résultat, le plus récent)
        const url_api = "https://api.thingspeak.com/channels/3355320/feeds.json?api_key=PKYTRUQWGQLXYG9&results=1";

        function recupererDonnees() {
            fetch(url_api)
                .then(reponse => reponse.json())
                .then(data => {
                    // On vérifie qu'il y a bien des données
                    if(data.feeds && data.feeds.length > 0) {
                        const dernier_message = data.feeds[0];
                        
                        // On met à jour le texte sur la page web avec Field 1 et Field 4
                        document.getElementById('val_temp').innerText = dernier_message.field1;
                        document.getElementById('val_ia').innerText = dernier_message.field4;
                    }
                })
                .catch(erreur => console.error("Erreur de connexion à ThingSpeak :", erreur));
        }

        // On lance la fonction tout de suite
        recupererDonnees();
        
        // Et on lui dit de recommencer toutes les 20 secondes (20000 millisecondes)
        setInterval(recupererDonnees, 20000);
    </script>

</body>
</html>
